<svg host="65bd71144e" xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="781px" height="451px" viewBox="-0.5 -0.5 781 451">
    <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#333333" style="fill: light-dark(#333333, #cccccc);"/>
        </marker>
    </defs>
    <g>
        <!-- Background -->
        <rect x="0" y="0" width="780" height="450" fill="#ffffff" stroke="#000000"
              style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: light-dark(rgb(0,0,0), rgb(255,255,255));"/>

        <!-- ===== ACTOR BOXES ===== -->

        <!-- Sequence -->
        <rect x="30" y="8" width="170" height="50" rx="4"
              fill="#dae8fc" stroke="#6c8ebf"
              style="fill: light-dark(rgb(218,232,252), rgb(29,41,59)); stroke: light-dark(rgb(108,142,191), rgb(92,121,163));"/>
        <text x="115" y="38" text-anchor="middle"
              font-family="Helvetica" font-size="15" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">Sequence</text>

        <!-- Sequencer -->
        <rect x="300" y="8" width="180" height="50" rx="4"
              fill="#d5e8d4" stroke="#82b366"
              style="fill: light-dark(rgb(213,232,212), rgb(31,47,30)); stroke: light-dark(rgb(130,179,102), rgb(68,110,44));"/>
        <text x="390" y="38" text-anchor="middle"
              font-family="Helvetica" font-size="15" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">Sequencer</text>

        <!-- Driver -->
        <rect x="580" y="8" width="170" height="50" rx="4"
              fill="#fff2cc" stroke="#d6b656"
              style="fill: light-dark(rgb(255,242,204), rgb(40,29,0)); stroke: light-dark(rgb(214,182,86), rgb(109,81,0));"/>
        <text x="665" y="38" text-anchor="middle"
              font-family="Helvetica" font-size="15" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">Driver</text>

        <!-- ===== LIFELINES (dashed) ===== -->
        <line x1="115" y1="58" x2="115" y2="440"
              stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"
              style="stroke: light-dark(#999999, #666666);"/>
        <line x1="390" y1="58" x2="390" y2="440"
              stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"
              style="stroke: light-dark(#999999, #666666);"/>
        <line x1="665" y1="58" x2="665" y2="440"
              stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"
              style="stroke: light-dark(#999999, #666666);"/>

        <!-- ===== STEP 1: start_item(item)  Sequence → Sequencer  y=100 ===== -->
        <line x1="115" y1="100" x2="383" y2="100"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="252" y="93" text-anchor="middle"
              font-family="Helvetica" font-size="12"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">start_item(item)</text>

        <!-- note: (περιμένει άδεια) -->
        <text x="122" y="118" text-anchor="start"
              font-family="Helvetica" font-size="11" font-style="italic"
              fill="#666666" style="fill: light-dark(#666666, #aaaaaa);">(περιμένει άδεια)</text>

        <!-- ===== STEP 2: get_next_item()  Driver → Sequencer  y=155 ===== -->
        <line x1="665" y1="155" x2="397" y2="155"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="531" y="148" text-anchor="middle"
              font-family="Helvetica" font-size="12"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">get_next_item()</text>

        <!-- ===== STEP 3: grant_item()  Sequencer → Driver  y=198 ===== -->
        <line x1="390" y1="198" x2="658" y2="198"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="524" y="191" text-anchor="middle"
              font-family="Helvetica" font-size="12"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">grant_item()</text>

        <!-- ===== STEP 4: (συνεχίζει)  Sequencer → Sequence  y=238 ===== -->
        <line x1="390" y1="238" x2="122" y2="238"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="252" y="231" text-anchor="middle"
              font-family="Helvetica" font-size="12" font-style="italic"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">(συνεχίζει)</text>

        <!-- note: randomize item -->
        <text x="122" y="258" text-anchor="start"
              font-family="Helvetica" font-size="11"
              fill="#444444" style="fill: light-dark(#444444, #bbbbbb);">randomize item</text>

        <!-- ===== STEP 5: finish_item(item)  Sequence → Sequencer  y=285 ===== -->
        <line x1="115" y1="285" x2="383" y2="285"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="252" y="278" text-anchor="middle"
              font-family="Helvetica" font-size="12"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">finish_item(item)</text>

        <!-- note: (μπλοκάρει) -->
        <text x="122" y="303" text-anchor="start"
              font-family="Helvetica" font-size="11" font-style="italic"
              fill="#666666" style="fill: light-dark(#666666, #aaaaaa);">(μπλοκάρει)</text>

        <!-- ===== STEP 6: item στον driver  Sequencer → Driver  y=335 ===== -->
        <line x1="390" y1="335" x2="658" y2="335"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="524" y="328" text-anchor="middle"
              font-family="Helvetica" font-size="12"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">item στον driver</text>

        <!-- ===== STEP 7: item_done()  Driver → Sequencer  y=375 ===== -->
        <line x1="665" y1="375" x2="397" y2="375"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="531" y="368" text-anchor="middle"
              font-family="Helvetica" font-size="12"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">item_done()</text>

        <!-- ===== STEP 8: (ξεμπλοκάρει)  Sequencer → Sequence  y=415 ===== -->
        <line x1="390" y1="415" x2="122" y2="415"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333, #cccccc);"/>
        <text x="252" y="408" text-anchor="middle"
              font-family="Helvetica" font-size="12" font-style="italic"
              fill="#000000" style="fill: light-dark(#000000, #ffffff);">(ξεμπλοκάρει)</text>

    </g>
    <switch>
        <g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"/>
        <a transform="translate(0,-5)" xlink:href="https://www.drawio.com/doc/faq/svg-export-text-problems" target="_blank">
            <text text-anchor="middle" font-size="10px" x="50%" y="100%">Text is not SVG - cannot display</text>
        </a>
    </switch>
</svg>
