<svg host="65bd71144e" xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="461px" height="441px" viewBox="-0.5 -0.5 461 441">
    <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#333333" style="fill: light-dark(#333333,#cccccc);"/>
        </marker>
    </defs>
    <g>
        <!-- Background -->
        <rect x="0" y="0" width="460" height="440" fill="#ffffff" stroke="#000000"
              style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: light-dark(rgb(0,0,0), rgb(255,255,255));"/>

        <!-- 1. run_phase() starts -->
        <rect x="90" y="10" width="280" height="48" rx="24"
              fill="#dae8fc" stroke="#6c8ebf"
              style="fill: light-dark(rgb(218,232,252), rgb(29,41,59)); stroke: light-dark(rgb(108,142,191), rgb(92,121,163));"/>
        <text x="230" y="39" text-anchor="middle"
              font-family="Helvetica" font-size="13" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000,#ffffff);">run_phase() ξεκινά</text>

        <!-- Arrow 1→2 -->
        <line x1="230" y1="58" x2="230" y2="82"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333,#cccccc);"/>

        <!-- 2. forever diamond -->
        <!-- vertices: top(230,88) right(310,128) bottom(230,168) left(150,128) -->
        <polygon points="230,88 310,128 230,168 150,128"
                 fill="#f5f5f5" stroke="#666666" stroke-width="1.5"
                 style="fill: light-dark(#f5f5f5,#2a2a2a); stroke: light-dark(#666666,#aaaaaa);"/>
        <text x="230" y="133" text-anchor="middle"
              font-family="Helvetica" font-size="13" font-weight="bold" font-style="italic"
              fill="#333333" style="fill: light-dark(#333333,#dddddd);">forever</text>

        <!-- Arrow 2→3 -->
        <line x1="230" y1="168" x2="230" y2="192"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333,#cccccc);"/>

        <!-- 3. get_next_item(req) -->
        <rect x="70" y="195" width="320" height="58" rx="6"
              fill="#d5e8d4" stroke="#82b366"
              style="fill: light-dark(rgb(213,232,212), rgb(31,47,30)); stroke: light-dark(rgb(130,179,102), rgb(68,110,44));"/>
        <text x="230" y="218" text-anchor="middle"
              font-family="Helvetica" font-size="13" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000,#ffffff);">seq_item_port.get_next_item(req)</text>
        <text x="230" y="236" text-anchor="middle"
              font-family="Helvetica" font-size="11" font-style="italic"
              fill="#555555" style="fill: light-dark(#555555,#aaaaaa);">(μπλοκάρει μέχρι το επόμενο item)</text>

        <!-- Arrow 3→4 -->
        <line x1="230" y1="253" x2="230" y2="277"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333,#cccccc);"/>

        <!-- 4. drive_transfer(req) -->
        <rect x="70" y="280" width="320" height="58" rx="6"
              fill="#fff2cc" stroke="#d6b656"
              style="fill: light-dark(rgb(255,242,204), rgb(40,29,0)); stroke: light-dark(rgb(214,182,86), rgb(109,81,0));"/>
        <text x="230" y="303" text-anchor="middle"
              font-family="Helvetica" font-size="13" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000,#ffffff);">drive_transfer(req)</text>
        <text x="230" y="321" text-anchor="middle"
              font-family="Helvetica" font-size="11" font-style="italic"
              fill="#555555" style="fill: light-dark(#555555,#aaaaaa);">(εφαρμόζει τα signals στο virtual interface)</text>

        <!-- Arrow 4→5 -->
        <line x1="230" y1="338" x2="230" y2="362"
              stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              style="stroke: light-dark(#333333,#cccccc);"/>

        <!-- 5. item_done() -->
        <rect x="70" y="365" width="320" height="58" rx="6"
              fill="#f8cecc" stroke="#b85450"
              style="fill: light-dark(rgb(248,206,204), rgb(58,20,18)); stroke: light-dark(rgb(184,84,80), rgb(140,50,46));"/>
        <text x="230" y="388" text-anchor="middle"
              font-family="Helvetica" font-size="13" font-weight="bold"
              fill="#000000" style="fill: light-dark(#000000,#ffffff);">seq_item_port.item_done()</text>
        <text x="230" y="406" text-anchor="middle"
              font-family="Helvetica" font-size="11" font-style="italic"
              fill="#555555" style="fill: light-dark(#555555,#aaaaaa);">(ειδοποιεί τον sequencer — ξεμπλοκάρει το sequence)</text>

        <!-- Back arrow: item_done → forever diamond (right side) -->
        <!-- Path: right of item_done box → right margin → up → diamond right vertex -->
        <path d="M 390 394 L 430 394 L 430 128 L 318 128"
              fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arr)"
              stroke-dasharray="5,3"
              style="stroke: light-dark(#333333,#cccccc);"/>
    </g>
    <switch>
        <g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"/>
        <a transform="translate(0,-5)" xlink:href="https://www.drawio.com/doc/faq/svg-export-text-problems" target="_blank">
            <text text-anchor="middle" font-size="10px" x="50%" y="100%">Text is not SVG - cannot display</text>
        </a>
    </switch>
</svg>
